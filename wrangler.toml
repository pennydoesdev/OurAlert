// wrangler.toml
name = "ouralert"
main = "src/index.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain binding — attach ouralert.org to this Worker via the
# Cloudflare dashboard AFTER the first successful deploy:
#   Workers & Pages → ouralert → Settings → Domains & Routes → Add
#
# Dashboard binding is preferred over the routes= block here because the
# routes block requires the zone to already be in the Cloudflare account
# with DNS pointed at Cloudflare. Once the zone is active, you can either
# keep using the dashboard binding or uncomment this block.
#
# routes = [
#   { pattern = "ouralert.org", custom_domain = true },
#   { pattern = "www.ouralert.org", custom_domain = true }
# ]

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "ouralert"
database_id = "548714f1-d169-433d-b530-f2d7e0d56d42"

# R2 bucket for media uploads
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "ouralert-media"

# KV for hot analytics buffer, rate limits, zip cache
[[kv_namespaces]]
binding = "CACHE"
id = "98e719e25b7d422f8894d06b39bd6cfb"

# Assets (static frontend) served from the Worker
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Scheduled jobs — analytics, email queue, alert fan-out, digest, cleanup.
[triggers]
crons = [
  "*/2 * * * *",
  "*/3 * * * *",
  "*/5 * * * *",
  "*/15 * * * *",
  "0 * * * *",
  "30 * * * *",
  "0 3 * * *",
  "0 0 * * 0",
  "0 13 * * *"
]

# Secrets — set with `wrangler secret put <name>`
# TURNSTILE_SECRET, SES_ACCESS_KEY_ID, SES_SECRET_ACCESS_KEY, SES_REGION,
# SES_FROM, LOOPS_API_KEY, FEATHERLESS_API_KEY, ONESIGNAL_APP_ID,
# ONESIGNAL_REST_KEY, IP_SALT, SESSION_SECRET, ADMIN_NOTIFY_EMAIL

[vars]
APP_NAME = "OurALERT"
APP_VERSION = "0.1.0-phase1j"
APP_URL = "https://ouralert.org"
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"
DEFAULT_EMAIL_PROVIDER = "ses"
